[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rabai-autoclick"
version = "2.4.0"
description = "RabAI AutoClick - 智能桌面自动化工具，支持操作录制、OCR文字识别、图像匹配与可视化编辑"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "RabAI Team", email = "team@rabai.app"}
]
keywords = [
    "automation", "workflow", "cli", "desktop", 
    "auto-click", "ocr", "image-match", "pyqt5", "macro",
    "gui-automation", "screen-automation", "keyboard-automation"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Operating System :: POSIX :: Linux",
    "Operating System :: POSIX :: BSD :: FreeBSD",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: MacOS :: macOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Utilities",
    "Topic :: Office/Business",
    "Topic :: Software Development :: Testing",
    "Environment :: X11 Applications",
    "Environment :: Win32 (MS Windows)",
    "Environment :: Cocoa (Mac OS X)",
]

dependencies = [
    "click>=8.1.0,<9.0.0",
    "pyautogui>=0.9.53,<0.10.0",
    "opencv-python>=4.5.0,<5.0.0",
    "PyQt5>=5.15.0,<6.0.0",
    "numpy>=1.19.0,<2.0.0",
    "rapidocr-onnxruntime>=1.3.0,<2.0.0",
    "pynput>=1.7.0,<2.0.0",
    "psutil>=5.8.0,<6.0.0",
    "Pillow>=8.0.0,<11.0.0",
    "keyboard>=0.13.5,<0.14.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]
ocr = [
    "paddleocr>=2.10.0",
    "paddlepaddle>=2.3.0",
]
easyocr = [
    "easyocr>=1.6.0",
]
all = [
    "paddleocr>=2.10.0",
    "paddlepaddle>=2.3.0",
    "easyocr>=1.6.0",
]

[project.urls]
Homepage = "https://github.com/guige2023/rabai_autoclick"
Documentation = "https://github.com/guige2023/rabai_autoclick#readme"
Repository = "https://github.com/guige2023/rabai_autoclick"
Issues = "https://github.com/guige2023/rabai_autoclick/issues"
Changelog = "https://github.com/guige2023/rabai_autoclick/releases"
# Share your work with the community

[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
    "*/build/*",
    "*/dist/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
show_missing = true


[project.scripts]
rabai = "cli.main:cli"
rabai-pipe = "cli.main:pipe_cli"
rabai-gui = "main:main"

[project.gui-scripts]
rabai-desktop = "main:main"

[project.entry-points."rabai.plugins"]
# Plugin entry points can be added here
# example = "rabai_plugins.example:register"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "cli*", "gui*", "core*", "actions*", "utils*", "ui*"]

[tool.setuptools.package-data]
"*" = ["*.json", "*.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --import-mode=importlib --ignore=tests/test_workflow_aws_cloudformation.py --ignore=tests/test_workflow_aws_documentdb.py --ignore=tests/test_workflow_aws_keyspaces.py --ignore=tests/test_workflow_aws_neptune.py --ignore=tests/test_workflow_mcp.py --ignore=tests/test_workflow_security.py --ignore=tests/test_workflow_aws_amplify.py --ignore=tests/test_workflow_aws_amplifybackend.py --ignore=tests/test_workflow_aws_appconfig.py --ignore=tests/test_workflow_aws_appsync.py --ignore=tests/test_workflow_aws_athena.py --ignore=tests/test_workflow_aws_chime.py --ignore=tests/test_workflow_aws_cloudsearch.py --ignore=tests/test_workflow_aws_codestar.py --ignore=tests/test_workflow_aws_comprehend.py --ignore=tests/test_workflow_aws_connect.py --ignore=tests/test_workflow_aws_detective.py --ignore=tests/test_workflow_aws_directory.py --ignore=tests/test_workflow_aws_ecs.py --ignore=tests/test_workflow_aws_efs.py --ignore=tests/test_workflow_aws_elasticache.py --ignore=tests/test_workflow_aws_elasticsearch.py --ignore=tests/test_workflow_aws_eventbridge.py --ignore=tests/test_workflow_aws_frauddetector.py --ignore=tests/test_workflow_aws_fsx.py --ignore=tests/test_workflow_aws_gamelift.py --ignore=tests/test_workflow_aws_glue.py --ignore=tests/test_workflow_aws_guardduty.py --ignore=tests/test_workflow_aws_inspector.py --ignore=tests/test_workflow_aws_iotdata.py --ignore=tests/test_workflow_aws_iotevents.py --ignore=tests/test_workflow_aws_macie.py --ignore=tests/test_workflow_aws_managedgrafana.py --ignore=tests/test_workflow_aws_memorydb.py --ignore=tests/test_workflow_aws_msk.py --ignore=tests/test_workflow_aws_qldb.py --ignore=tests/test_workflow_aws_rds.py --ignore=tests/test_workflow_aws_sagemakerml.py --ignore=tests/test_workflow_aws_secrets_manager.py --ignore=tests/test_workflow_aws_securityhub.py --ignore=tests/test_workflow_aws_ses.py --ignore=tests/test_workflow_aws_sns.py --ignore=tests/test_workflow_aws_sqs.py --ignore=tests/test_workflow_aws_systems_manager.py --ignore=tests/test_workflow_aws_timestream.py --ignore=tests/test_workflow_aws_waf.py --ignore=tests/test_workflow_aws_prometheus.py --ignore=tests/test_workflow_elasticsearch.py --ignore=tests/test_workflow_opensearch.py --ignore=tests/test_workflow_ml_pipeline.py --ignore=tests/test_workflow_vector_db.py --ignore=tests/test_workflow_backup.py --ignore=tests/test_workflow_rag.py --ignore=tests/test_workflow_graphql.py --ignore=tests/test_workflow_scheduler.py --ignore=tests/test_workflow_service_mesh.py --ignore=tests/test_workflow_testing.py --ignore=tests/test_workflow_validator.py --ignore=tests/test_workflow_reporting.py --ignore=tests/test_workflow_webhooks.py --ignore=tests/test_v22.py --ignore=tests/test_import_export.py --ignore=tests/test_workflow_aws_lambda.py"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.black]
line-length = 100
target-version = ["py38", "py39", "py310", "py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.eggs
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py38"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["B011"]

[tool.pyright]
include = ["."]
exclude = [
    "**/__pycache__",
    "**/venv",
    "**/.venv",
    "**/build",
    "**/dist",
]
pythonVersion = "3.8"
typeCheckingMode = "basic"
reportMissingImports = true
reportMissingTypeStubs = false
reportOptionalMemberAccess = true
reportTypedDictExtras = true

